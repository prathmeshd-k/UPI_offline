# Application properties for Docker deployment
# This file is loaded when running in Docker with: java -Dspring.profiles.active=docker -jar app.jar

# PostgreSQL Database Configuration (with env variable overrides)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/upimesh}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:upiuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:SecurePassword123!}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL95Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Application Configuration
upi.mesh.idempotency-ttl-seconds=${UPI_MESH_IDEMPOTENCY_TTL_SECONDS:86400}
upi.mesh.packet-max-age-seconds=${UPI_MESH_PACKET_MAX_AGE_SECONDS:86400}

# Actuator (for health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# Logging Configuration
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.demo.upimesh=${LOGGING_LEVEL_COM_DEMO_UPIMESH:INFO}
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
